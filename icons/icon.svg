<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#1a1610"/>
  <rect width="512" height="512" rx="80" fill="url(#sand)"/>
  <defs>
    <radialGradient id="sand" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#2a2010"/>
      <stop offset="100%" stop-color="#0d0b08"/>
    </radialGradient>
  </defs>
  <!-- Outer diamond frame -->
