  <circle cx="422" cy="256" r="5" fill="#7a5518"/>
  <circle cx="256" cy="422" r="5" fill="#7a5518"/>
  <circle cx="90" cy="256" r="5" fill="#7a5518"/>
  <!-- Text -->
