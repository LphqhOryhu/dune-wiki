<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dune Wiki</title>
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#c8922a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Dune Wiki">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="stylesheet" href="style.css">
  <!-- Quill rich text editor -->
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
  <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
</head>
<body>
  <div id="navbar-root"></div>
  <div id="app-root"></div>

  <!-- Load order: dependencies first -->
  <script src="data/schema.js"></script>
  <script src="store.js"></script>
  <script src="router.js"></script>
  <script src="components/navbar.js"></script>
  <script src="components/infobox.js"></script>
  <script src="components/linksEditor.js"></script>
  <script src="components/timelineEditor.js"></script>
  <script src="pages/home.js"></script>
  <script src="pages/view.js"></script>
  <script src="pages/edit.js"></script>
  <script src="pages/category.js"></script>
  <script src="pages/timeline.js"></script>
  <script src="pages/search.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js');
      });
    }
  </script>
</body>
</html>
